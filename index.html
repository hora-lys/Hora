<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LANCEMENT DANS</title>
  <style>
    :root {
      --bg: #f3f0ec;
      --text: #3a3432;
      --box: #3f3735;
      --white: #ffffff;
      --orange: #c9693d;
      --green: #3f5a35;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .shape {
      position: fixed;
      z-index: 0;
      border-radius: 999px;
      opacity: 1;
      pointer-events: none;
    }

    .shape.top-left {
      width: 190px;
      height: 190px;
      background: var(--green);
      top: -95px;
      left: -95px;
    }

    .shape.top-right {
      width: 180px;
      height: 180px;
      background: var(--orange);
      top: -90px;
      right: -90px;
    }

    .shape.bottom-left {
      width: 180px;
      height: 180px;
      background: var(--orange);
      bottom: -90px;
      left: -90px;
    }

    .shape.bottom-right {
      width: 190px;
      height: 190px;
      background: var(--green);
      bottom: -95px;
      right: -95px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: min(100%, 1100px);
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 5.4rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 0.95;
      text-transform: uppercase;
    }

    .countdown {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-width: 92px;
    }

    .digits {
      display: flex;
      gap: 6px;
    }

    .digit {
      width: clamp(42px, 8vw, 92px);
      height: clamp(56px, 11vw, 120px);
      background: var(--box);
      color: var(--white);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 6vw, 4.8rem);
      font-weight: 700;
      line-height: 1;
      box-shadow: inset 0 -1px 0 rgba(255,255,255,0.08);
    }

    .label {
      font-size: clamp(0.72rem, 1.8vw, 1.15rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .separator {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 700;
      line-height: 1;
      padding-top: clamp(6px, 1.2vw, 12px);
      color: var(--text);
    }

    .ended {
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      font-weight: 700;
      text-transform: uppercase;
    }

    @media (max-width: 700px) {
      .container {
        gap: 28px;
        padding: 32px 14px;
      }

      .countdown {
        gap: 10px;
      }

      .unit {
        min-width: 72px;
        gap: 10px;
      }

      .separator {
        padding-top: 8px;
      }
    }

    @media (max-width: 520px) {
      .countdown {
        display: grid;
        grid-template-columns: 1fr 1fr;
        justify-items: center;
        row-gap: 18px;
        column-gap: 10px;
      }

      .separator {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="shape top-left"></div>
  <div class="shape top-right"></div>
  <div class="shape bottom-left"></div>
  <div class="shape bottom-right"></div>

  <main class="container">
    <h1>LANCEMENT DANS</h1>

    <section class="countdown" id="countdown">
      <div class="unit">
        <div class="digits">
          <div class="digit" id="daysTens">0</div>
          <div class="digit" id="daysOnes">0</div>
        </div>
        <div class="label">Jours</div>
      </div>

      <div class="separator">:</div>

      <div class="unit">
        <div class="digits">
          <div class="digit" id="hoursTens">0</div>
          <div class="digit" id="hoursOnes">0</div>
        </div>
        <div class="label">Heures</div>
      </div>

      <div class="separator">:</div>

      <div class="unit">
        <div class="digits">
          <div class="digit" id="minutesTens">0</div>
          <div class="digit" id="minutesOnes">0</div>
        </div>
        <div class="label">Minutes</div>
      </div>

      <div class="separator">:</div>

      <div class="unit">
        <div class="digits">
          <div class="digit" id="secondsTens">0</div>
          <div class="digit" id="secondsOnes">0</div>
        </div>
        <div class="label">Secondes</div>
      </div>
    </section>
  </main>

  <script>
    // Date cible : vendredi 10 avril à 08:00:00
    const targetDate = new Date("2026-04-14T08:00:00");

    const ids = {
      daysTens: document.getElementById("daysTens"),
      daysOnes: document.getElementById("daysOnes"),
      hoursTens: document.getElementById("hoursTens"),
      hoursOnes: document.getElementById("hoursOnes"),
      minutesTens: document.getElementById("minutesTens"),
      minutesOnes: document.getElementById("minutesOnes"),
      secondsTens: document.getElementById("secondsTens"),
      secondsOnes: document.getElementById("secondsOnes"),
      countdown: document.getElementById("countdown")
    };

    function setPair(value, tensEl, onesEl) {
      const str = String(value).padStart(2, "0");
      tensEl.textContent = str[0];
      onesEl.textContent = str[1];
    }

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        ids.countdown.innerHTML = '<div class="ended">00 : 00 : 00 : 00</div>';
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      setPair(Math.min(days, 99), ids.daysTens, ids.daysOnes);
      setPair(hours, ids.hoursTens, ids.hoursOnes);
      setPair(minutes, ids.minutesTens, ids.minutesOnes);
      setPair(seconds, ids.secondsTens, ids.secondsOnes);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
